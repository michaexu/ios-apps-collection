name: ScreenKite
options:
  bundleIdPrefix: com.screenkite
  deploymentTarget:
    macOS: "12.3"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.3"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: ScreenKite
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: ScreenKite
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    INFOPLIST_KEY_NSScreenCaptureUsageDescription: "ScreenKite 需要屏幕录制权限来录制您的屏幕内容。"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "ScreenKite 需要麦克风权限来录制您的语音旁白。"

targets:
  ScreenKite:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Tests/**"
          - "**/*.xcassets"
    resources:
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screenkite.app
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Resources/ScreenKite.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Resources/ScreenKite.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.screen-recording: true
        com.apple.security.device.audio-input: true

  ScreenKiteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/Tests
    dependencies:
      - target: ScreenKite
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screenkite.app.tests
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - "@test_runner_path/../Frameworks"

schemes:
  ScreenKite:
    build:
      targets:
        ScreenKite: all
        ScreenKiteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ScreenKiteTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
