name: SilverLink
options:
  bundleIdPrefix: com.silverlink
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_CFBundleDisplayName: "SilverLink"
    INFOPLIST_KEY_NSMotionUsageDescription: "用于跌倒检测，守护您的安全"
    INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄照片和视频通话"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "用于语音消息和视频通话"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "用于位置共享，让家人随时了解您的位置"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于分享照片到家庭相册"

targets:
  SilverLink:
    type: application
    platform: iOS
    sources:
      - path: SilverLink
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silverlink.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
