name: RunIntervalPro
options:
  bundleIdPrefix: com.runinterval
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: 48N3Z9LS5J
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"

targets:
  RunIntervalPro:
    type: application
    platform: iOS
    sources:
      - path: ios/RunIntervalPro
        excludes:
          - "**/.DS_Store"
      - path: shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: ios/RunIntervalPro/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.runinterval.pro
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: RunIntervalPro_AppStore
    entitlements:
      path: ios/RunIntervalPro/Resources/RunIntervalPro.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  RunIntervalProWatch:
    type: application
    platform: watchOS
    sources:
      - path: watch/RunIntervalProWatch
        excludes:
          - "**/.DS_Store"
      - path: shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: watch/RunIntervalProWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.runinterval.pro.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        TARGETED_DEVICE_FAMILY: 4
        WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.runinterval.pro
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: 48N3Z9LS5J
    entitlements:
      path: watch/RunIntervalProWatch/RunIntervalProWatch.entitlements
      properties: {}

schemes:
  RunIntervalPro:
    build:
      targets:
        RunIntervalPro: all
        RunIntervalProWatch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
